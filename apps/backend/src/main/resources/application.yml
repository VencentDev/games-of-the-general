spring:
  application:
    name: backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/app}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  flyway:
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  rate-limit:
    auth:
      enabled: ${APP_RATE_LIMIT_AUTH_ENABLED:true}
      capacity: ${APP_RATE_LIMIT_AUTH_CAPACITY:60}
      refill-period: ${APP_RATE_LIMIT_AUTH_REFILL_PERIOD:1m}

management:
  endpoints:
    web:
      exposure:
        include: health,info
